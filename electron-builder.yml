appId: com.dogy.chm-viewer
productName: Dogy CHM Viewer
copyright: Copyright © 2024

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - '!**/*.map'

mac:
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.reference
  darkModeSupport: false
  # Hardened runtime enables Library Validation, which requires every loaded
  # binary to share one Team ID. Ad-hoc signatures (used for unsigned CI builds)
  # have no Team ID, so the hardened runtime rejects the Electron Framework at
  # launch ("different Team IDs"). Keep it OFF for ad-hoc distribution.
  # For a notarized Developer ID release, set this back to true (notarization
  # requires hardened runtime) — the entitlements below cover Electron's needs.
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  title: "${productName} ${version}"
  icon: build/icon.icns
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

afterSign: scripts/notarize.js

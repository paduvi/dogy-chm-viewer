name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & typecheck
        run: |
          npm run lint
          npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build universal DMG
        # electron-vite build + electron-builder. --publish never disables
        # electron-builder's own GitHub publishing (which is otherwise triggered
        # implicitly by the git tag); the upload step below handles release assets.
        run: npx electron-vite build && npx electron-builder --mac --universal --publish never
        env:
          # Build an unsigned app. Setting this to "false" stops electron-builder
          # from searching for a signing identity (which fails on CI runners and
          # produced the "<repo> not a file" error). To enable code-signing,
          # add CSC_LINK + CSC_KEY_PASSWORD secrets and set this to "true".
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
